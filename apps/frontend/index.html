<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>TonCheckers</title>
    <link rel="icon" type="image/png" href="/gameicon.png" />
    <link rel="apple-touch-icon" href="/gameicon.png" />

    <!-- Telegram Mini App SDK — MUST load before app JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      /* Prevent flash of unstyled content — match Telegram theme immediately */
      :root {
        color-scheme: light dark;
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        /* Use Telegram's theme variables from the start */
        background-color: var(--tg-theme-bg-color, #ffffff);
        color: var(--tg-theme-text-color, #000000);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        /* Disable pull-to-refresh and text selection on mobile */
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Allow selection inside text inputs */
      input, textarea { -webkit-user-select: auto; user-select: auto; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
